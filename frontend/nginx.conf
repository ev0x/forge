server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy /api/* to the API container on the internal docker network.
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large bar-data uploads (Sierra .scid files can be multi-GB).
        client_max_body_size 5G;
        proxy_request_buffering off;        # stream body straight through to the API
        proxy_buffering off;
        proxy_read_timeout 1800s;           # 30 min for huge uploads / aggregations
        proxy_send_timeout 1800s;
    }

    location / {
        try_files $uri /index.html;
    }
}
